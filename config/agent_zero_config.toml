# Agent Zero — OpenCrabs Runtime Configuration
# GitHub Models LLM backbone — zero cost, one token

[database]
# Stores Agent Zero's conversation history
# path = "~/.opencrabs/opencrabs.db"

[providers.github]
# GitHub Models — GPT-4o + o1-mini free tier
# Token auto-detected from keys.toml
enabled = true
base_url = "https://models.inference.ai.azure.com/chat/completions"
default_model = "gpt-4o"

[providers.custom.github_models]
enabled = true
base_url = "https://models.inference.ai.azure.com/chat/completions"
models = ["gpt-4o", "gpt-4o-mini", "o1-mini", "o1-preview", "Meta-Llama-3.1-405B-Instruct", "Mistral-large-2411"]
default_model = "gpt-4o"
